# Configuration for the rca-recon skill. The user supplies only the recon_id;
# everything else is read from here.

# Where Lakebridge reconcile writes its output tables (main/metrics/details).
recon_catalog: fevm_ps_dr_us_east_2_catalog
recon_schema: reconcile

# The ORIGINAL source EDW dialect, used to pick the semantic knowledge base
# (type mappings, function differences, remediation). e.g. snowflake, oracle, mssql.
dialect: snowflake

# Optional: SQL warehouse for local/CLI runs. Inside Genie Code the notebook's
# spark session is used, so this is not required there.
warehouse_id: 4c79c6902dd2bbc2

# Where to write the generated RCA notebook + JSON. The user can override this per
# run (just tell the skill where to save).
#   - A bare folder name (default) is created under the current user's workspace
#     home: /Workspace/Users/<current_user>/<folder>  (durable, per-user).
#   - An absolute path is used as-is, e.g.:
#       /Volumes/<catalog>/<schema>/<vol>   (Unity Catalog volume)
#       /Workspace/Shared/rca               (shared workspace folder)
#       /tmp                                (driver-local, ephemeral)
output_dir: rca_notebooks

# The deterministic engine (rca_engine) is vendored inside this skill folder, so
# it imports directly from the workspace — no external package install is needed.

# Optional: Lakebridge workflow artifacts for CODE-AWARE RCA (confirms cause from
# the code, not just data). All optional; omit for pure data-driven RCA.
#   recon_config_path:     Lakebridge reconcile config JSON (join keys, mappings, filters) = the mapping
#   transpiled_output_dir: TARGET scripts — transpiled Databricks SQL (lakebridge transpile --output-folder)
#   source_scripts_dir:    SOURCE scripts — original-dialect DDL (declared source types, e.g. NUMBER(18,4))
#   transpile_error_file:  Lakebridge transpile error report (transpile --error-file-path)
# recon_config_path: /Workspace/Users/<you>/lakebridge/recon_config.json
# transpiled_output_dir: /Workspace/Users/<you>/lakebridge/transpiled
# source_scripts_dir: /Workspace/Users/<you>/lakebridge/source_sql
# transpile_error_file: /Workspace/Users/<you>/lakebridge/transpile_errors.log

# Optional: explicit PER-TABLE script manifest (most robust — removes any file<->table
# ambiguity of the folder scans above). Point each target table at its own source and
# migrated (target) SQL. Overrides the folder scans for the tables listed.
#
# A ready-made example for the bundled pilot migration lives at
# migration/pilot/table_manifest.yml (6 core tables, Snowflake source <-> Databricks
# target). Copy its `tables:` block here, or upload the pilot scripts and point the
# folder scans at them instead:
#   source_scripts_dir:    <.../pilot/source_snowflake>   # authentic Snowflake DDL
#   transpiled_output_dir: <.../pilot/target_databricks>  # migrated Databricks scripts
#
# tables:
#   - target: fact_orders
#     source: FACT_ORDERS                 # optional; defaults to target
#     source_script: .../pilot/source_snowflake/fact_orders.sql   # declared source types
#     target_script: .../pilot/target_databricks/fact_orders.sql  # migrated transform
#     join_keys: [order_id]               # optional override
#     date_column: order_ts               # optional override

# Optional: use Unity Catalog lineage (system.access.column_lineage / table_lineage)
# as an extra evidence source — confirms a column's true upstream provenance and the
# upstream tables feeding a target (helps locate where a volume/drift cause entered).
# Requires lineage to have been captured for the target tables + query access; degrades
# gracefully to nothing if unavailable. Off by default.
use_uc_lineage: false
