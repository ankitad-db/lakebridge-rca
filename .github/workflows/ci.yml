name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,code]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest

  vendored-in-sync:
    name: vendored engine matches source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diff rca_engine vs skill copy
        run: |
          if ! diff -rq --exclude='__pycache__' rca_engine skill/rca-recon/rca_engine; then
            echo "::error::skill/rca-recon/rca_engine is out of sync with rca_engine/. Run 'make sync'."
            exit 1
          fi
          echo "Vendored engine is in sync."
